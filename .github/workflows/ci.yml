# ────────────────────────────────────────────────────────────────────────────
# CI — 集成测试
#
# 触发时机：
#   - 每次 push（任意分支）
#   - 每次 Pull Request（向 master / main）
#
# 测试方案：
#   docker compose -f docker-compose.test.yml up --build --abort-on-container-exit
#   通过容器退出码判断成功 / 失败。
# ────────────────────────────────────────────────────────────────────────────
name: CI

on:
  push:
    branches: ["**"]
    # 打 release tag 时由 release.yml 负责，这里跳过，避免重复
    tags-ignore: ["v*"]
  pull_request:
    branches: [master, main]

jobs:
  integration-test:
    name: Integration Tests · ${{ matrix.protocol }}
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        include:
          - protocol: mysql
            compose_file: docker-compose.test.yml
          - protocol: postgres
            compose_file: docker-compose.test-pg.yml

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Run integration tests via Docker Compose
        run: |
          docker compose -f ${{ matrix.compose_file }} \
            up --build --abort-on-container-exit \
            --exit-code-from runner

      - name: Show proxy logs on failure
        if: failure()
        run: docker compose -f ${{ matrix.compose_file }} logs proxy

      - name: Cleanup
        if: always()
        run: docker compose -f ${{ matrix.compose_file }} down -v --remove-orphans
